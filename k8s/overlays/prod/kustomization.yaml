apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ciyex-prod

resources:
  - ../../base

namePrefix: prod-

labels:
  - pairs:
      environment: prod
    includeSelectors: false

replicas:
  - name: ciyex-portal-ui
    count: 2

images:
  - name: ciyex-portal-ui
    newName: nginx
    newTag: "latest"

patches:
  - target:
      kind: Ingress
      name: ciyex-portal-ui-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ciyex-portal.apps-prod.in.hinisoft.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: ciyex-portal.apps-prod.in.hinisoft.com

configMapGenerator:
  - name: portal-ui-config
    literals:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://app.ciyex.com/api
