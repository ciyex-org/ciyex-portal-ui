apiVersion: apps/v1
kind: Deployment
metadata:
  name: ciyex-portal-ui
  labels:
    app: ciyex-portal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ciyex-portal-ui
  template:
    metadata:
      labels:
        app: ciyex-portal-ui
    spec:
      imagePullSecrets:
        - name: ciyex-portal-ui-regcred
      containers:
        - name: ciyex-portal-ui
          image: registry.apps-prod.us-east.in.hinisoft.com/ciyex-portal-ui:2.0.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          env:
            - name: NODE_ENV
              value: "production"
          envFrom:
            - configMapRef:
                name: portal-ui-config
                optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
