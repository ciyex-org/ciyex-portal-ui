apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ciyex-stage

resources:
  - ../../base

namePrefix: stage-

labels:
  - pairs:
      environment: stage
    includeSelectors: false

replicas:
  - name: ciyex-portal-ui
    count: 1

images:
  - name: ciyex-portal-ui
    newName: ciyex/ciyex-portal-ui
    newTag: "2.0.2"

configMapGenerator:
  - name: portal-ui-config
    envs:
      - .env.stage

patches:
  - target:
      kind: Deployment
      name: ciyex-portal-ui
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0
        value:
          configMapRef:
            name: portal-ui-config
  - target:
      kind: Ingress
      name: ciyex-portal-ui-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ciyex-portal.apps-stage.in.hinisoft.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: ciyex-portal.apps-stage.in.hinisoft.com
