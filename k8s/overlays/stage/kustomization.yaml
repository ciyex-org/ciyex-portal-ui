apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ciyex-stage

resources:
  - ../../base

namePrefix: stage-

labels:
  - pairs:
      environment: stage
    includeSelectors: false

replicas:
  - name: ciyex-portal-ui
    count: 1

images:
  - name: registry.apps-prod.us-east.in.hinisoft.com/ciyex-portal-ui
    newTag: "latest"

patches:
  - target:
      kind: Ingress
      name: ciyex-portal-ui-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ciyex-portal.apps-stage.in.hinisoft.com

configMapGenerator:
  - name: portal-ui-config
    envs:
      - .env.stage
