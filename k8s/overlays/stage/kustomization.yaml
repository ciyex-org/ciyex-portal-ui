apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ciyex-stage

resources:
  - ../../base

namePrefix: stage-

labels:
  - pairs:
      environment: stage
    includeSelectors: false

replicas:
  - name: ciyex-portal-ui
    count: 0

images:
  - name: registry.apps-prod.us-east.in.hinisoft.com/ciyex-portal-ui
    newTag: "2.0.2"

configMapGenerator:
  - name: portal-ui-config
    literals:
      - NODE_ENV=staging
      - NEXT_PUBLIC_API_URL=https://api-stage.ciyex.org
      - NEXT_PUBLIC_KEYCLOAK_URL=https://stage.aran.me
      - NEXT_PUBLIC_KEYCLOAK_REALM=master
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=ciyex-app
      - NEXT_PUBLIC_KEYCLOAK_ENABLED=true

patches:
  - target:
      kind: Deployment
      name: ciyex-portal-ui
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0
        value:
          configMapRef:
            name: portal-ui-config
  - target:
      kind: Ingress
      name: ciyex-portal-ui-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: portal-stage.ciyex.org
      - op: replace
        path: /spec/tls/0/hosts/0
        value: portal-stage.ciyex.org
