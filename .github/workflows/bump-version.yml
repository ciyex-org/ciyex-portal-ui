name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g., 0.0.2)'
        required: true
        type: string
      bump_type:
        description: 'Version type to update'
        required: true
        type: choice
        options:
          - release
          - rc
          - alpha
        default: 'alpha'

env:
  IMAGE_NAME: ciyex-portal-ui
  REGISTRY: registry.apps-prod.us-east.in.hinisoft.com

jobs:
  bump-version:
    name: Bump Version
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Use semantic versioning (e.g., 0.0.2)"
            exit 1
          fi
          echo "✅ Version format valid: ${{ inputs.version }}"

      - name: Update package.json version
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          echo "✅ Updated package.json to version ${{ inputs.version }}"
          grep '"version"' package.json

      - name: Determine image tag
        id: tag
        run: |
          VERSION="${{ inputs.version }}"
          BUMP_TYPE="${{ inputs.bump_type }}"
          
          case $BUMP_TYPE in
            release)
              TAG="$VERSION"
              OVERLAY="prod"
              ;;
            rc)
              TAG="$VERSION-rc.1"
              OVERLAY="stage"
              ;;
            alpha)
              TAG="$VERSION-alpha.1"
              OVERLAY="dev"
              ;;
          esac
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "overlay=$OVERLAY" >> $GITHUB_OUTPUT
          echo "✅ Image tag will be: $TAG (overlay: $OVERLAY)"

      - name: Update deployment patch
        run: |
          OVERLAY="${{ steps.tag.outputs.overlay }}"
          TAG="${{ steps.tag.outputs.tag }}"
          
          sed -i "s|image: $REGISTRY/$IMAGE_NAME:.*|image: $REGISTRY/$IMAGE_NAME:$TAG|" k8s/overlays/$OVERLAY/deployment-patch.yaml
          echo "✅ Updated k8s/overlays/$OVERLAY/deployment-patch.yaml"
          grep "image:" k8s/overlays/$OVERLAY/deployment-patch.yaml

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add package.json package-lock.json k8s/overlays/ || git add package.json k8s/overlays/
          git commit -m "chore: bump version to ${{ inputs.version }} (${{ inputs.bump_type }})"
          git push

      - name: Summary
        run: |
          echo "## Version Bump Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | ${{ inputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump Type | ${{ inputs.bump_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Updated Overlay | ${{ steps.tag.outputs.overlay }} |" >> $GITHUB_STEP_SUMMARY
